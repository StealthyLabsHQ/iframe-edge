<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none';" />
    <title>Countdowns</title>
    <meta name="x-icue-property" content="countdown1Label" data-label="tr('Event 1 Label')" data-type="textfield"
        data-default="'Vacation'" />
    <meta name="x-icue-property" content="countdown1Date" data-label="tr('Event 1 Date')" data-type="textfield"
        data-default="'2026-12-24'" />
    <meta name="x-icue-property" content="countdown1Color" data-label="tr('Event 1 Color')" data-type="textfield"
        data-default="'#00c8ff'" />
    <meta name="x-icue-property" content="countdown2Label" data-label="tr('Event 2 Label')" data-type="textfield"
        data-default="'Birthday'" />
    <meta name="x-icue-property" content="countdown2Date" data-label="tr('Event 2 Date')" data-type="textfield"
        data-default="'2026-08-01'" />
    <meta name="x-icue-property" content="countdown2Color" data-label="tr('Event 2 Color')" data-type="textfield"
        data-default="'#ffb84d'" />
    <meta name="x-icue-property" content="countdown3Label" data-label="tr('Event 3 Label')" data-type="textfield"
        data-default="'Launch'" />
    <meta name="x-icue-property" content="countdown3Date" data-label="tr('Event 3 Date')" data-type="textfield"
        data-default="'2026-06-01'" />
    <meta name="x-icue-property" content="countdown3Color" data-label="tr('Event 3 Color')" data-type="textfield"
        data-default="'#a678ff'" />
    <script type="application/json" id="x-icue-groups">
        [{ "title": "tr('Countdowns')", "properties": ["countdown1Label","countdown1Date","countdown1Color","countdown2Label","countdown2Date","countdown2Color","countdown3Label","countdown3Date","countdown3Color"] }]
    </script>
    <link rel="stylesheet" href="../xeneon-widget.css" />
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <main id="widget" class="x-widget">
        <header class="x-top">
            <div class="x-stack">
                <p class="x-kicker">Planner</p>
                <h1 class="x-title">Countdowns</h1>
            </div>
            <span id="nextDate" class="x-badge">--</span>
        </header>

        <section class="hero x-card">
            <p id="nextLabel" class="x-kicker x-truncate">Next Event</p>
            <h2><span id="nextDays">--</span><small id="nextUnit">days</small></h2>
            <p id="nextStatus" class="x-clamp-2">Set dates in iCUE settings.</p>
        </section>

        <section id="cards" class="cards x-grid" aria-label="Countdown list"></section>
        <section class="x-overlay" id="overlay">
            <strong>No Events</strong>
            <span>Add countdown dates in iCUE settings.</span>
        </section>
    </main>
    <script src="./app.js"></script>
</body>

</html>
