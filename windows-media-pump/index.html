<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none';" />
    <title>Windows Media Pump</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <main id="widget">
        <section class="album-art">
            <img id="albumImg" alt="" hidden />
        </section>
        <section class="media-orb" id="fallbackOrb">
            <div class="source" id="source">WIN</div>
            <div class="bars" aria-hidden="true"><span></span><span></span><span></span></div>
        </section>
        <section class="track-panel">
            <div class="track-name" id="trackName">Windows Media</div>
            <div class="track-artist" id="trackArtist">Play audio on Windows</div>
        </section>
        <section class="state" id="stateOverlay">
            <div class="state-title" id="stateTitle">No Media</div>
            <div class="state-sub" id="stateSub">Play music in Spotify, YouTube, Chrome, Firefox, or another app.</div>
        </section>
    </main>

    <script src="./app.js"></script>
</body>

</html>
