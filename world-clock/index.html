<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none';" />
    <title>World Clock</title>
    <meta name="x-icue-property" content="clockTz1" data-label="tr('Time Zone 1')" data-type="textfield"
        data-default="'Europe/Paris'" />
    <meta name="x-icue-property" content="clockTz2" data-label="tr('Time Zone 2')" data-type="textfield"
        data-default="'America/New_York'" />
    <meta name="x-icue-property" content="clockTz3" data-label="tr('Time Zone 3')" data-type="textfield"
        data-default="'Asia/Tokyo'" />
    <meta name="x-icue-property" content="clockTz4" data-label="tr('Time Zone 4')" data-type="textfield"
        data-default="'UTC'" />
    <meta name="x-icue-property" content="clockFormat" data-label="tr('Format')" data-type="tab-buttons"
        data-default="'24h'" data-values="[{'key':'24h','value':'24h'},{'key':'12h','value':'12h'}]" />
    <script type="application/json" id="x-icue-groups">
        [{ "title": "tr('World Clock')", "properties": ["clockTz1","clockTz2","clockTz3","clockTz4","clockFormat"] }]
    </script>
    <link rel="stylesheet" href="../xeneon-widget.css" />
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <main id="widget" class="x-widget">
        <header class="x-top">
            <div class="x-stack">
                <p class="x-kicker">Local Time</p>
                <h1 id="local" class="x-title">--:--</h1>
            </div>
            <span id="format" class="x-badge">24h</span>
        </header>
        <section class="grid x-grid">
            <article class="x-card clock-card" data-slot="1">
                <div class="row">
                    <small class="x-label" data-name>City</small>
                    <span class="dot" data-dot></span>
                </div>
                <b class="x-value" data-time>--:--</b>
                <small class="x-label dim" data-date>--</small>
            </article>
            <article class="x-card clock-card" data-slot="2">
                <div class="row">
                    <small class="x-label" data-name>City</small>
                    <span class="dot" data-dot></span>
                </div>
                <b class="x-value" data-time>--:--</b>
                <small class="x-label dim" data-date>--</small>
            </article>
            <article class="x-card clock-card" data-slot="3">
                <div class="row">
                    <small class="x-label" data-name>City</small>
                    <span class="dot" data-dot></span>
                </div>
                <b class="x-value" data-time>--:--</b>
                <small class="x-label dim" data-date>--</small>
            </article>
            <article class="x-card clock-card" data-slot="4">
                <div class="row">
                    <small class="x-label" data-name>City</small>
                    <span class="dot" data-dot></span>
                </div>
                <b class="x-value" data-time>--:--</b>
                <small class="x-label dim" data-date>--</small>
            </article>
        </section>
    </main>
    <script src="./app.js"></script>
</body>

</html>
