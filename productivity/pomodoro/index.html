<!doctype html>
<html lang="en">

<head>
  <!-- 1. Theme (prevents FOUC) -->
  <script src="../theme-loader.js"></script>
  <!-- 2. Size detection — sets data-size="m|l|xl" on <html> from ?size= URL param -->
  <script src="../size-loader.js"></script>

  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests" />
  <title>Pomodoro</title>
  <link rel="icon" href="https://stealthylabs.eu/logos/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Xeneon Edge fonts: Space Grotesk (UI) + IBM Plex Sans (body) + JetBrains Mono (digits) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet" />
  <!-- Xeneon Edge Design System -->
  <link rel="stylesheet" href="../xeneon-edge.css" />
  <!-- Widget-specific styles -->
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="widget" id="widget">

    <!-- ── Header ─────────────────────────────────────────── -->
    <div class="mod-header">
      <div class="mod-icon" aria-hidden="true">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <polyline points="12 6 12 12 16 14" />
        </svg>
      </div>
      <span class="mod-title" id="t-title">Pomodoro</span>
      <div class="lang-toggle" id="themeToggle" role="button" aria-label="Toggle theme"
        style="margin-left: auto">🌙</div>
      <div class="lang-toggle" id="langToggle" role="button" aria-label="Toggle language">EN</div>
    </div>

    <!-- ── Stats Row — XL only ───────────────────────────── -->
    <div class="stats-row" role="status" aria-live="polite" aria-label="Session statistics">
      <div class="stat-chip">
        <span class="stat-label">Session</span>
        <span class="stat-value" id="statSession">1 / 4</span>
      </div>
      <div class="stat-chip">
        <span class="stat-label">Focused</span>
        <span class="stat-value" id="statFocused">0m</span>
      </div>
      <div class="stat-chip">
        <span class="stat-label">Done</span>
        <span class="stat-value" id="statDone">0</span>
      </div>
    </div>

    <!-- ── Timer Body ─────────────────────────────────────── -->
    <div class="timer-body">

      <!-- Phase badge — hidden in size M -->
      <div class="phase-badge focus" id="phaseBadge" aria-live="polite">
        <span class="badge-dot" aria-hidden="true"></span>
        <span id="phaseLabel">Focus</span>
      </div>

      <!-- Ring timer — ring SVG hidden in size M, digits always visible -->
      <div class="ring-wrap" role="img" aria-label="Timer ring">
        <svg class="ring-svg" viewBox="0 0 100 100" aria-hidden="true">
          <defs>
            <filter id="timerGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2.5" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          <circle class="ring-track" cx="50" cy="50" r="42" />
          <circle class="ring-progress" id="ringProgress" cx="50" cy="50" r="42"
            stroke-dasharray="263.89" stroke-dashoffset="0" />
        </svg>
        <div class="ring-center">
          <div class="timer-digits" id="timerDigits" aria-live="off">25:00</div>
          <div class="timer-sublabel" id="timerSub">focus</div>
        </div>
      </div>

      <!-- Session progress dots -->
      <div class="session-dots" id="sessionDots" role="list" aria-label="Completed sessions">
        <div class="s-dot" data-idx="0" role="listitem"></div>
        <div class="s-dot" data-idx="1" role="listitem"></div>
        <div class="s-dot" data-idx="2" role="listitem"></div>
        <div class="s-dot" data-idx="3" role="listitem"></div>
      </div>

      <!-- Controls -->
      <div class="timer-controls">
        <button class="btn btn-ghost" id="resetBtn" aria-label="Reset timer">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="1 4 1 10 7 10" />
            <path d="M3.51 15a9 9 0 1 0 .49-3.86" />
          </svg>
        </button>

        <button class="btn btn-timer" id="startBtn" aria-label="Start timer">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" id="startIcon" aria-hidden="true">
            <polygon points="5 3 19 12 5 21 5 3" />
          </svg>
          <span id="startLabel">Start</span>
        </button>

        <button class="btn btn-ghost" id="skipBtn" aria-label="Skip phase">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polygon points="5 4 15 12 5 20 5 4" />
            <line x1="19" y1="5" x2="19" y2="19" />
          </svg>
        </button>
      </div>
    </div>

    <!-- ── M: Bottom Progress Bar ─────────────────────────── -->
    <!-- Thin linear progress — replaces the ring in size M   -->
    <div class="m-progress-bar" aria-hidden="true">
      <div class="m-progress-fill" id="mProgressFill"></div>
    </div>

  </div><!-- /.widget -->

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="./app.js"></script>
</body>

</html>
