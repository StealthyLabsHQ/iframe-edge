<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' https://unpkg.com https://www.youtube.com https://s.ytimg.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.wheretheiss.at; frame-src https://www.youtube.com; object-src 'none'; base-uri 'none'; form-action 'none';" />
    <script src="../productivity/theme-loader.js"></script>
    <title>ISS Horizon</title>
    <link rel="icon" href="https://stealthylabs.eu/logos/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="./css/widget.css" />
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>
    <div id="widget">

        <!-- ── Header ─────────────────────────────────────────────── -->
        <div class="hdr">
            <div class="hdr-icon" aria-hidden="true">
                <!-- ISS icon -->
                <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 2a1 1 0 0 0-1 1v1.07A8.001 8.001 0 0 0 4.07 11H3a1 1 0 0 0 0 2h1.07A8.001 8.001 0 0 0 11 19.93V21a1 1 0 0 0 2 0v-1.07A8.001 8.001 0 0 0 19.93 13H21a1 1 0 0 0 0-2h-1.07A8.001 8.001 0 0 0 13 4.07V3a1 1 0 0 0-1-1zm0 4a6 6 0 1 1 0 12A6 6 0 0 1 12 6zm0 2a4 4 0 1 0 0 8 4 4 0 0 0 0-8z" />
                </svg>
            </div>
            <span class="hdr-title">ISS Horizon</span>
            <span class="hdr-spacer"></span>

            <!-- Live badge -->
            <span class="live-badge" id="liveBadge">
                <span class="live-dot"></span>LIVE
            </span>



            <!-- Settings toggle -->
            <button class="icon-btn" id="settingsToggle" aria-label="Settings">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
            </button>
        </div>

        <!-- ── Zone Supérieure: YouTube Live Feed ─────────────── -->
        <div class="video-zone" id="videoZone">
            <iframe id="ytIframe"
                src="https://www.youtube.com/embed/zPH5KtjJFaQ?autoplay=1&mute=1&modestbranding=1&rel=0&playsinline=1"
                allow="autoplay; encrypted-media" allowfullscreen frameborder="0"
                style="width:100%;height:100%;border:none;display:block;"></iframe>
            <!-- Source switch button -->
            <button class="source-btn" id="sourceBtn" aria-label="Switch camera" title="Switch ISS camera feed">
                📷 <span id="sourceName">HD Views</span>
            </button>
            <!-- Video overlay label -->
            <div class="video-label">📡 ISS — Live from Space</div>
        </div>



        <!-- ── Zone Inférieure: Telemetry Data ────────────────────── -->
        <div class="data-zone" id="dataZone">
            <div class="data-card" id="cardSpeed">
                <div class="data-icon">🚀</div>
                <div class="data-body">
                    <div class="data-value" id="valSpeed">—</div>
                    <div class="data-label">Speed</div>
                </div>
            </div>
            <div class="data-divider"></div>
            <div class="data-card" id="cardAlt">
                <div class="data-icon">📡</div>
                <div class="data-body">
                    <div class="data-value" id="valAlt">—</div>
                    <div class="data-label">Altitude</div>
                </div>
            </div>
            <div class="data-divider"></div>
            <div class="data-card" id="cardLat">
                <div class="data-icon">🌐</div>
                <div class="data-body">
                    <div class="data-value" id="valLat">—</div>
                    <div class="data-label">Latitude</div>
                </div>
            </div>
            <div class="data-divider"></div>
            <div class="data-card" id="cardLon">
                <div class="data-icon">🌍</div>
                <div class="data-body">
                    <div class="data-value" id="valLon">—</div>
                    <div class="data-label">Longitude</div>
                </div>
            </div>
        </div>

        <!-- ── Zone Carte 2D: Ground Track ───────────────────────── -->
        <div class="map-zone" id="mapZone">
            <div class="map-hdr">
                <span class="map-hdr-label">📍 Ground Track</span>
                <button class="map-follow-btn active" id="mapFollowBtn" title="Follow ISS">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                    Follow ISS
                </button>
            </div>
            <div id="issMap"></div>
        </div>

        <!-- ── Settings panel ─────────────────────────────────────── -->
        <div id="settingsPanel" role="dialog" aria-label="Settings" aria-modal="true">
            <div class="settings-hdr">
                <h2>⚙️ Settings</h2>
                <button class="icon-btn" id="closeSettings" aria-label="Close settings">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>

            <div class="field">
                <label for="inputVideoId">YouTube Video ID</label>
                <input type="text" id="inputVideoId" placeholder="e.g. itdOFB8DQCA" autocomplete="off"
                    spellcheck="false" />
                <div class="field-hint">NASA HDEV Live Stream ID. Leave default for official NASA feed.</div>
            </div>



            <div class="divider"></div>
            <button class="save-btn" id="saveBtn">Save</button>
        </div>

    </div><!-- /widget -->

    <!-- Toast notification -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>



    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./app.js"></script>
</body>

</html>
