<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="x-icue-property" content="issMapStyle" data-label="tr('Map Style')" data-type="tab-buttons"
        data-default="'dark'" data-values="[
            {'key':'dark','value':'Dark'},
            {'key':'satellite','value':'Satellite'},
            {'key':'day','value':'Day'},
            {'key':'auto','value':'Auto'}
        ]" />
    <meta name="x-icue-groups" content='[{"label":"tr(\"ISS Horizon\")","properties":["issMapStyle"]}]' />
    <meta name="referrer" content="origin" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' https://fonts.googleapis.com https://unpkg.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.wheretheiss.at; object-src 'none'; base-uri 'none'; form-action 'none'; upgrade-insecure-requests;" />

    <title>ISS Horizon</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet" />
    <!-- Xeneon Edge Design System — shared tokens & base styles -->
    <link rel="stylesheet" href="../productivity/xeneon-edge.css" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous" />

    <style>
        /* ── Base & Theme (OLED Dark — Xeneon Edge) ─────────────── */
        /* Widget-specific tokens bridge to xeneon-edge.css base.
           Size is injected by iCUE as body class: sz-m / sz-l / sz-xl */
        :root {
            /* Bridge — map ISS local names to xeneon-edge tokens */
            --bg-base:        var(--bg);             /* #000000 */
            --bg-panel:       rgba(255,255,255,0.04); /* xeneon surface */
            --bg-overlay:     rgba(0, 0, 0, 0.72);

            --text-main:      var(--text-1);          /* #ffffff */
            --text-dim:       var(--text-2);          /* rgba(255,255,255,0.60) */
            --text-muted:     var(--text-3);          /* rgba(255,255,255,0.35) */

            /* ISS-specific accents (not overriding xeneon --accent) */
            --accent-blue:    #00c8ff;                /* Xeneon cyan for data/map */
            --accent-blue-dim: rgba(0, 200, 255, 0.14);
            --accent-nasa:    #fc3d21;                /* NASA red — live / alerts */

            --border-subtle:  var(--border);          /* rgba(255,255,255,0.08) */
            --border-focus:   var(--border-h);        /* rgba(255,255,255,0.18) */

            /* Fonts — now using xeneon-edge Space Grotesk + JetBrains Mono */
            --font-ui:        var(--font-h);          /* 'Space Grotesk' */
            --font-mono:      var(--font-m);          /* 'JetBrains Mono' */

            --radius-md:      10px;
            --radius-sm:      6px;

            --transition:     var(--tr);              /* 0.18s cubic-bezier */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-ui);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* ── Layout (Responsive to body class sz-*) ──────────── */
        .widget-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 8px;
            overflow: hidden;
        }

        .header-zone {
            flex-shrink: 0;
        }

        .telemetry-grid {
            flex-shrink: 0;
        }

        body.sz-m .data-map-stack {
            flex: 1 1 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
            min-height: 0;
        }

        body.sz-m .map-wrapper {
            flex: 1 1 0;
            min-height: 120px;
        }

        body.sz-l .data-map-stack {
            flex: 1 1 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
            min-height: 0;
        }

        body.sz-l .map-wrapper {
            flex: 1 1 0;
            min-height: 120px;
        }

        /* sz-xl: Side-by-side grid */
        body.sz-xl .widget-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 8px;
        }

        body.sz-xl .data-map-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1 1 0;
            overflow: hidden;
            min-height: 0;
        }

        body.sz-xl .map-wrapper {
            flex: 1 1 0;
            min-height: 0;
        }

        /* ── Header ───────────────────────────────────────────── */
        .header-zone {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            height: 48px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        .brand svg {
            color: var(--accent-nasa);
        }

        /* Day / Night Badge */
        .solar-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--bg-base);
            border: 1px solid var(--border-subtle);
            color: var(--text-dim);
            transition: var(--transition);
        }

        .solar-badge.is-day {
            color: #fbbc04;
            border-color: rgba(251, 188, 4, 0.3);
            background: rgba(251, 188, 4, 0.1);
        }

        .solar-badge.is-night {
            color: #8ab4f8;
            border-color: rgba(138, 180, 248, 0.3);
            background: rgba(138, 180, 248, 0.1);
        }

        /* ── Telemetry Grid ───────────────────────────────────── */
        .telemetry-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        body.sz-m .telemetry-grid {
            grid-template-columns: repeat(2, 1fr);
        }

        .tel-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
            overflow: hidden;
        }

        .tel-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--accent-blue);
            opacity: 0.5;
        }

        .tel-header {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-dim);
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .tel-header svg {
            color: var(--text-muted);
        }

        /* Value styling */
        .tel-val {
            font-family: var(--font-mono);
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        /* ── Map Zone ─────────────────────────────────────────── */
        .map-wrapper {
            background: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            overflow: hidden;
            position: relative;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-height: 180px;
        }

        .map-header {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .map-title {
            background: var(--bg-overlay);
            backdrop-filter: blur(4px);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--border-subtle);
        }

        .follow-btn {
            pointer-events: auto;
            background: var(--bg-overlay);
            backdrop-filter: blur(4px);
            border: 1px solid var(--border-subtle);
            color: var(--text-dim);
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .follow-btn.active {
            color: var(--text-main);
            border-color: var(--accent-blue);
            background: var(--accent-blue-dim);
        }

        .follow-btn:hover {
            border-color: var(--text-muted);
        }

        .map-style-controls {
            pointer-events: auto;
            display: flex;
            gap: 4px;
            padding: 3px;
            border-radius: 18px;
            background: var(--bg-overlay);
            border: 1px solid var(--border-subtle);
            backdrop-filter: blur(4px);
        }

        .map-style-btn {
            border: 0;
            border-radius: 14px;
            padding: 4px 9px;
            background: transparent;
            color: var(--text-dim);
            font-family: var(--font-ui);
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .map-style-btn.active {
            background: var(--accent-blue-dim);
            color: var(--text-main);
        }

        #issMap {
            width: 100%;
            height: 100%;
            flex-grow: 1;
            background: #262626;
            /* matches CartoDB dark tile ocean color */
        }

        #issMap::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 500;
            pointer-events: none;
            opacity: 0;
            background: radial-gradient(circle at 50% 45%, transparent 0 30%, rgba(0, 0, 0, 0.58) 72%);
            transition: opacity var(--transition);
        }

        body.map-night #issMap::after {
            opacity: 1;
        }

        /* Leaflet overrides */
        .leaflet-control-zoom {
            border: none !important;
        }

        .leaflet-control-zoom a {
            background: var(--bg-overlay) !important;
            color: var(--text-main) !important;
            border-color: var(--border-subtle) !important;
            backdrop-filter: blur(4px);
        }

        .leaflet-control-zoom a:hover {
            background: rgba(255, 255, 255, 0.1) !important;
        }

        .iss-map-marker {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .iss-dot {
            width: 14px;
            height: 14px;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px var(--accent-blue);
            position: relative;
        }

        .iss-dot::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: radar 2s linear infinite;
        }

        @keyframes radar {
            from {
                transform: scale(0.8);
                opacity: 1;
            }

            to {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        /* ── Pass Prediction Popup ────────────────────────────── */
        .leaflet-popup-content-wrapper {
            background: rgba(10, 10, 12, 0.92) !important;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 10px !important;
            color: var(--text-main) !important;
            font-family: var(--font-ui) !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6) !important;
        }

        .leaflet-popup-tip {
            background: rgba(10, 10, 12, 0.92) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        .leaflet-popup-content {
            margin: 12px 14px !important;
            font-size: 0.8rem !important;
            line-height: 1.5 !important;
        }

        .pass-popup-title {
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .pass-popup-time {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: 700;
            color: #fbbc04;
        }

        .pass-popup-detail {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .pass-popup-unreachable {
            color: var(--accent-nasa);
            font-weight: 600;
        }

        .leaflet-popup-close-button {
            color: var(--text-dim) !important;
        }
    </style>
</head>

<body class="sz-l"> <!-- Default to sz-l for testing, iCUE injects exact size class -->

    <div class="widget-container">

        <!-- HEADER -->
        <header class="header-zone">
            <div class="brand">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M12 2A10 10 0 1 0 22 12 10 10 0 0 0 12 2ZM2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                </svg>
                ISS HORIZON
            </div>

            <div class="solar-badge" id="solarBadge">
                <span id="solarIcon">🌤️</span> <span id="solarText">CALC...</span>
            </div>
        </header>

        <!-- TELEMETRY & MAP STACK -->
        <div class="data-map-stack">
            <div class="telemetry-grid">
                <!-- Speed -->
                <div class="tel-card">
                    <div class="tel-header">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polygon points="22 2 15 22 11 13 2 9 22 2" />
                        </svg>
                        Velocity
                    </div>
                    <div class="tel-val" id="valSpeed">0</div>
                </div>
                <!-- Alt -->
                <div class="tel-card">
                    <div class="tel-header">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="12" y1="20" x2="12" y2="10" />
                            <line x1="18" y1="20" x2="18" y2="4" />
                            <line x1="6" y1="20" x2="6" y2="16" />
                        </svg>
                        Altitude
                    </div>
                    <div class="tel-val" id="valAlt">0</div>
                </div>
                <!-- Lat -->
                <div class="tel-card">
                    <div class="tel-header">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <line x1="2" y1="12" x2="22" y2="12" />
                        </svg>
                        Latitude
                    </div>
                    <div class="tel-val" id="valLat">0.00°</div>
                </div>
                <!-- Lon -->
                <div class="tel-card">
                    <div class="tel-header">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <path
                                d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                        </svg>
                        Longitude
                    </div>
                    <div class="tel-val" id="valLon">0.00°</div>
                </div>
            </div>

            <div class="map-wrapper">
                <div class="map-header">
                    <div class="map-title">Ground Track</div>
                    <button class="follow-btn active" id="btnFollow">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                        Follow
                    </button>
                </div>
                <div id="issMap"></div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>

    <script src="./icue-iss-bridge.js"></script>
    <script src="./app.js"></script>
</body>

</html>
