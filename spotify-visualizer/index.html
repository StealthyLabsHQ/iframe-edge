<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://spotify-auth-worker.code-39c.workers.dev https://api.spotify.com https://accounts.spotify.com https://lrclib.net; object-src 'none'; base-uri 'none'; form-action 'none';" />
    <script src="../productivity/theme-loader.js"></script>
    <script src="../productivity/size-loader.js"></script>
    <title>Spotify Visualizer</title>
    <meta name="x-icue-property" content="spotifyClientId" data-label="tr('Spotify Client ID')" data-type="textfield"
        data-default="''" />
    <meta name="x-icue-property" content="spotifyResetPairing" data-label="tr('Reset Pairing Code')" data-type="textfield"
        data-default="''" />
    <script id="x-icue-groups" type="application/json">
        [
            {
                "title": "tr('Spotify Connection')",
                "properties": ["spotifyClientId", "spotifyResetPairing"]
            }
        ]
    </script>
    <link rel="icon" href="https://stealthylabs.eu/logos/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../productivity/xeneon-edge.css" />
    <link rel="stylesheet" href="./css/widget.css" />
    <link rel="stylesheet" href="../widget-polish.css" />
</head>

<body>
    <!-- Dynamic blurred background -->
    <div id="bgBlur"><img id="bgImg" alt="" aria-hidden="true" /></div>

    <!-- Main widget card -->
    <div id="widget">
        <!-- Content -->
        <div id="content">
            <!-- Left column: album + info + controls -->
            <div class="col-left" id="colLeft">
                <div class="col-left-inner" id="colLeftInner">
                    <div class="album-wrap" id="albumWrap">
                        <div class="no-art" id="noArt">♪</div>
                        <img id="albumImg" src="" alt="Album art" class="ui-hidden" />
                        <div class="vinyl-ring" id="vinylRing"></div>
                    </div>
                    <div class="track-info" id="trackInfo">
                        <div class="track-name" id="trackName">—</div>
                        <div class="track-artist" id="trackArtist">—</div>
                        <div class="track-album" id="trackAlbum"></div>
                    </div>
                </div>

                <div class="progress-wrap" id="progressWrap">
                    <div class="progress-bar" id="progressBar" role="slider" aria-label="Track progress">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-times">
                        <span id="timeElapsed">0:00</span>
                        <span id="timeTotal">0:00</span>
                    </div>
                </div>

                <div class="controls" id="controls">
                    <button class="ctrl-btn ctrl-sm" id="shuffleBtn" aria-label="Shuffle">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="16 3 21 3 21 8" />
                            <line x1="4" y1="20" x2="21" y2="3" />
                            <polyline points="21 16 21 21 16 21" />
                            <line x1="15" y1="15" x2="21" y2="21" />
                        </svg>
                    </button>
                    <button class="ctrl-btn" id="prevBtn" aria-label="Previous">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="19 20 9 12 19 4 19 20" />
                            <line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" />
                        </svg>
                    </button>
                    <button class="ctrl-btn play" id="playBtn" aria-label="Play/Pause">
                        <svg id="playIcon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5 3 19 12 5 21 5 3" />
                        </svg>
                    </button>
                    <button class="ctrl-btn" id="nextBtn" aria-label="Next">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5 4 15 12 5 20 5 4" />
                            <line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" />
                        </svg>
                    </button>
                    <button class="ctrl-btn ctrl-sm" id="repeatBtn" aria-label="Repeat" data-mode="off">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="17 1 21 5 17 9" />
                            <path d="M3 11V9a4 4 0 0 1 4-4h14" />
                            <polyline points="7 23 3 19 7 15" />
                            <path d="M21 13v2a4 4 0 0 1-4 4H3" />
                        </svg>
                    </button>
                </div>

                <!-- Volume -->
                <div class="volume-row" id="volumeRow">
                    <button class="ctrl-btn ctrl-sm volume-btn" id="volumeBtn" aria-label="Mute/Unmute">
                        <svg id="volumeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                            <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
                        </svg>
                    </button>
                    <input type="range" id="volumeSlider" min="0" max="100" value="100" aria-label="Volume" />
                </div>
            </div>

            <!-- Right column: lyrics (XL only) -->
            <div class="col-right" id="colRight">
                <div id="lyricsScroll">
                    <div class="no-lyrics" id="noLyrics">
                        <div class="icon">🎵</div>
                        <div id="t-no-song">Play a song to see lyrics</div>
                    </div>
                </div>
                <!-- Scroll controls -->
                <div class="lyrics-ctrl-bar" id="lyricsCtrlBar">
                    <button class="lyrics-ctrl-btn active" id="lyricsAutoBtn" title="Auto-scroll">
                        AUTO
                    </button>
                    <button class="lyrics-ctrl-btn" id="lyricsScrollUp" aria-label="Scroll up">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round">
                            <polyline points="18 15 12 9 6 15" />
                        </svg>
                    </button>
                    <button class="lyrics-ctrl-btn" id="lyricsScrollDown" aria-label="Scroll down">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round">
                            <polyline points="6 9 12 15 18 9" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- State overlay (no config / not playing) -->
        <div id="stateOverlay">
            <div class="state-icon" id="stateIcon">⚙️</div>
            <div class="state-title" id="stateTitle">Setup Required</div>
            <div class="state-sub" id="stateSub">Authorize Spotify to connect this widget.</div>
            <button class="state-btn ui-hidden" id="stateAction"></button>
        </div>

        <button class="icon-btn" id="themeToggle" aria-label="Toggle theme">DARK</button>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./app.js"></script>
    <script>
        function syncSpotifyIcueProperties(options) {
            var clientId = typeof spotifyClientId !== "undefined" ? spotifyClientId : undefined;
            var resetPairing = typeof spotifyResetPairing !== "undefined" ? spotifyResetPairing : undefined;
            return window.SpotifyVisualizerIcue.setPairing(clientId, undefined, undefined, resetPairing, options);
        }
        window.SpotifyVisualizerIcue.syncFromIcue = syncSpotifyIcueProperties;
        icueEvents = {
            onICUEInitialized: function () {
                syncSpotifyIcueProperties({ clearEmpty: true });
                window.SpotifyVisualizerIcue.onInitialized();
            },
            onDataUpdated: function () {
                syncSpotifyIcueProperties({ clearEmpty: false });
                window.SpotifyVisualizerIcue.onDataUpdated();
            }
        };
        if (typeof iCUE_initialized !== "undefined" && iCUE_initialized) {
            syncSpotifyIcueProperties({ clearEmpty: true });
            window.SpotifyVisualizerIcue.onInitialized();
        }
    </script>
</body>

</html>
